name: Notify Discord on New Book / Chapter

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history - a shallow clone can miss the "before" commit if a push contains several commits

      # ---- 1. What changed: brand-new books, and/or chapters added/edited in existing books? ----
      - name: Detect book and chapter changes
        id: detect
        env:
          NOTES_DIR: src/site/notes
        run: |
          set -euo pipefail
      
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
      
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || [ -z "$BEFORE" ]; then
            BEFORE=$(git rev-parse "$AFTER~1")
          fi
      
          echo "::group::Changed files"
          git diff --name-status "$BEFORE" "$AFTER" -- "$NOTES_DIR"
          echo "::endgroup::"
      
          declare -A NEW_BOOKS
          declare -A UPDATED_BOOKS
      
          while IFS=$'\t' read -r status path; do
            case "$status" in
              A|M) ;;
              *) continue ;;
            esac
      
            rel="${path#"$NOTES_DIR/"}"
      
            # Ignore files directly inside NOTES_DIR
            [[ "$rel" != */* ]] && continue
      
            book="${rel%%/*}"
            file="${rel#*/}"
            index="${book}.md"
      
            if [[ "$status" == "A" && "$file" == "$index" ]]; then
              # Brand-new book
              NEW_BOOKS["$book"]=1
            else
              # Existing book (or newly added chapter)
              if [[ "$file" != "$index" ]]; then
                chapter="${file%.md}"
      
                if [[ -n "${UPDATED_BOOKS[$book]:-}" ]]; then
                  UPDATED_BOOKS["$book"]="${UPDATED_BOOKS[$book]},$chapter"
                else
                  UPDATED_BOOKS["$book"]="$chapter"
                fi
              else
                # Index page edited
                : "${UPDATED_BOOKS[$book]:=}"
              fi
            fi
          done < <(git diff --name-status "$BEFORE" "$AFTER" -- "$NOTES_DIR")
      
          {
            echo "new_books<<EOF"
            for b in "${!NEW_BOOKS[@]}"; do
              echo "$b"
            done | sort
            echo "EOF"
      
            echo "updated_books<<EOF"
            for b in "${!UPDATED_BOOKS[@]}"; do
              echo "$b::${UPDATED_BOOKS[$b]}"
            done | sort
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      
          echo "::group::Summary"
          echo "New books:"
          printf '%s\n' "${!NEW_BOOKS[@]}"
          echo
          echo "Updated books:"
          for b in "${!UPDATED_BOOKS[@]}"; do
            echo "$b -> ${UPDATED_BOOKS[$b]}"
          done
          echo "::endgroup::"

      # ---- 2. Post to Discord ----
      - name: Notify Discord
        if: steps.detect.outputs.new_books != '' || steps.detect.outputs.updated_books != ''
        
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # SITE_URL: https://your-domain.com
          NEW_BOOKS: ${{ steps.detect.outputs.new_books }}
          UPDATED_BOOKS: ${{ steps.detect.outputs.updated_books }}
        run: |
          send() {
            curl -s -H "Content-Type: application/json" -X POST \
              -d "{\"content\": \"$1\"}" \
              "$DISCORD_WEBHOOK_URL"
          }

          while IFS= read -r book; do
            [ -z "$book" ] && continue
            PRETTY=$(echo "$book" | tr '-' ' ')
            send "📚 New book added: **${PRETTY}**\n${SITE_URL}"
          done <<< "$NEW_BOOKS"

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            book="${line%%::*}"
            chapters="${line#*::}"
            PRETTY=$(echo "$book" | tr '-' ' ')
            if [ -n "$chapters" ]; then
              CH_PRETTY=$(echo "$chapters" | tr ',' '|' | sed 's/|/, /g' | tr '-' ' ')
              send "✏️ **${PRETTY}** updated - new/edited: ${CH_PRETTY}\n${SITE_URL}"
            else
              send "✏️ **${PRETTY}** updated\n${SITE_URL}"
            fi
          done <<< "$UPDATED_BOOKS"
